name: Patch GitHub Pages data paths

on:
  push:
    paths:
      - .github/workflows/patch-github-pages-paths.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch index paths for project Pages
        shell: python
        run: |
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          replacements = {
              'const QUESTION_URL = "/data/under3_n5_diagnosis_questions_v0_1_20260526.json";': 'const QUESTION_URL = "data/under3_n5_diagnosis_questions_v0_1_20260526.json";',
              'const SERIES_URL = "/data/jlpt_n5_test_series_202606.json";': 'const SERIES_URL = "data/jlpt_n5_test_series_202606.json";',
              'const MOCK1_URL = "/data/jlpt_n5_mock_1_20260612.json";': 'const MOCK1_URL = "data/jlpt_n5_mock_1_20260612.json";',
              'const MOCK2_URL = "/data/jlpt_n5_mock_2_20260615.json";': 'const MOCK2_URL = "data/jlpt_n5_mock_2_20260615.json";',
              'const MOCK3_URL = "/data/jlpt_n5_mock_3_20260619.json";': 'const MOCK3_URL = "data/jlpt_n5_mock_3_20260619.json";',
              'const MOCK4_URL = "/data/jlpt_n5_mock_4_20260622.json";': 'const MOCK4_URL = "data/jlpt_n5_mock_4_20260622.json";',
          }
          changed = False
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new)
                  changed = True
          old_block = '''async function loadJson(url) {
  if (window.__N5_INLINE_DATA__ && window.__N5_INLINE_DATA__[url]) {
    return window.__N5_INLINE_DATA__[url];
  }
  const response = await fetch(url, { cache: "no-store" });'''
          new_block = '''async function loadJson(url) {
  const inlineKey = url.startsWith("data/") ? `/${url}` : url;
  if (window.__N5_INLINE_DATA__ && (window.__N5_INLINE_DATA__[url] || window.__N5_INLINE_DATA__[inlineKey])) {
    return window.__N5_INLINE_DATA__[url] || window.__N5_INLINE_DATA__[inlineKey];
  }
  const response = await fetch(url, { cache: "no-store" });'''
          if old_block in text:
              text = text.replace(old_block, new_block)
              changed = True
          p.write_text(text, encoding='utf-8')
          print('changed=', changed)
      - name: Commit patched index
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix data paths for GitHub Pages"
          git push

