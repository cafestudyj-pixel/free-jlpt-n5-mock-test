<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free JLPT N5 Mock Test Series for independent practice. Start with the warm-up test, then continue with scheduled mock tests." />
    <title>Free JLPT N5 Mock Test Series</title>
    <style>
:root {
  color-scheme: light;
  --ink: #1d2329;
  --muted: #66717d;
  --line: #dde3e8;
  --paper: #f6f8f7;
  --surface: #ffffff;
  --navy: #22324a;
  --green: #1f7a5a;
  --mint: #dff2ea;
  --gold: #d99b2b;
  --red: #b84d4a;
  --shadow: 0 18px 44px rgba(31, 43, 53, 0.11);
  font-family: Inter, "Noto Sans KR", "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  overflow-x: hidden;
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
}

button { border: 0; cursor: pointer; font: inherit; }
button:disabled { cursor: not-allowed; opacity: 0.5; }

.shell {
  width: min(1120px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 28px 0;
}

.loading-panel,
.hero,
.result-hero {
  display: grid;
  gap: 28px;
  align-items: center;
  min-height: 360px;
}

.hero,
.result-hero {
  grid-template-columns: minmax(0, 1fr) 320px;
}

.eyebrow {
  margin: 0 0 10px;
  color: var(--green);
  font-size: 0.78rem;
  font-weight: 900;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1, h2, h3, p { margin-top: 0; }

h1 {
  margin-bottom: 16px;
  overflow-wrap: anywhere;
  max-width: 820px;
  font-size: clamp(2.45rem, 6vw, 5.2rem);
  line-height: 1.02;
  letter-spacing: 0;
}

h2 { margin-bottom: 12px; font-size: 1.24rem; }
h3 { margin: 12px 0 8px; font-size: 1rem; }

 .lead {
  max-width: 700px;
  overflow-wrap: anywhere;
  color: var(--muted);
  font-size: 1.13rem;
  line-height: 1.65;
}

.actions,
.nav-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.primary,
.secondary,
.mini-button {
  min-height: 44px;
  border-radius: 8px;
  padding: 0 18px;
  font-weight: 900;
}

.primary { background: var(--green); color: white; }
.secondary, .mini-button { border: 1px solid var(--line); background: white; color: var(--ink); }
.mini-button { min-height: 38px; padding: 0 14px; }

.summary-card,
.panel,
.question-card,
.side-panel,
.schedule-card,
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.state-pill {
  display: inline-flex;
  width: fit-content;
  border-radius: 999px;
  padding: 5px 9px;
  background: var(--green);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 900;
}

.schedule-card.upcoming {
  background: #fbfcfd;
}
.schedule-card.upcoming .mini-button {
  background: #f4f6f7;
  color: var(--muted);
}
.disclaimer-band {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: var(--shadow);
}

.summary-card {
  display: grid;
  gap: 8px;
  padding: 24px;
}

.summary-number {
  color: var(--green);
  font-size: 4.5rem;
  font-weight: 950;
  line-height: 0.95;
}

.summary-card p,
.schedule-card p,
.small-note,
.panel p,
.side-panel p {
  overflow-wrap: anywhere;
  color: var(--muted);
  line-height: 1.55;
}

.schedule-section { margin-top: 18px; }
.section-heading { margin-bottom: 14px; }

.schedule-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.schedule-card {
  display: grid;
  min-height: 176px;
  align-content: space-between;
  gap: 18px;
  padding: 18px;
  box-shadow: none;
}

.schedule-card.available { border-color: rgba(31, 122, 90, 0.38); background: #f7fffb; }
.schedule-card.pending-content { border-color: rgba(217, 155, 43, 0.42); }

.date-pill {
  display: inline-flex;
  width: fit-content;
  border-radius: 999px;
  padding: 5px 9px;
  background: var(--mint);
  color: var(--green);
  font-size: 0.78rem;
  font-weight: 900;
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.state-pill {
  display: inline-flex;
  width: fit-content;
  border-radius: 999px;
  padding: 5px 9px;
  background: var(--green);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 900;
}

.schedule-card.upcoming {
  background: #fbfcfd;
}
.schedule-card.upcoming .mini-button {
  background: #f4f6f7;
  color: var(--muted);
}
.disclaimer-band {
  display: grid;
  gap: 6px;
  margin-top: 18px;
  padding: 16px 18px;
  box-shadow: none;
}
.disclaimer-band p { margin: 0; color: var(--muted); line-height: 1.55; }

.test-header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 18px;
}
.test-header h1 { margin: 0; font-size: clamp(2rem, 5vw, 4rem); }
.counter {
  min-width: 92px;
  border-radius: 8px;
  padding: 12px;
  background: var(--navy);
  color: white;
  text-align: center;
  font-weight: 950;
}

.progress-track {
  height: 10px;
  margin: 18px 0;
  overflow: hidden;
  border-radius: 999px;
  background: var(--mint);
}
.progress-track span { display: block; height: 100%; background: var(--green); }

.question-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 16px;
}
.question-card, .side-panel, .panel { padding: 22px; }
.question-id { color: var(--muted); font-weight: 900; }
.question-card h2 {
  font-size: clamp(1.55rem, 4vw, 2.5rem);
  line-height: 1.42;
  overflow-wrap: break-word;
  white-space: pre-wrap;
  word-break: normal;
  line-break: strict;
}

.choices { display: grid; gap: 10px; }
.choice {
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr);
  align-items: center;
  gap: 12px;
  min-height: 64px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: white;
  color: var(--ink);
  text-align: left;
}
.choice span {
  width: 40px;
  aspect-ratio: 1;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--mint);
  color: var(--green);
  font-weight: 950;
}
.choice strong { min-width: 0; overflow-wrap: anywhere; font-size: 1.14rem; }
.choice.selected { border-color: var(--green); background: #f0fbf5; }

.skill-card {
  display: grid;
  gap: 6px;
  margin: 16px 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #f7fbf9;
}
.skill-card span { color: var(--green); font-size: 0.78rem; font-weight: 900; text-transform: uppercase; }
.skill-card p { margin: 0; }

.nav-row { justify-content: flex-end; margin-top: 16px; }
.result-hero { min-height: 300px; }
.score-ring {
  width: 184px;
  aspect-ratio: 1;
  margin: 0 auto;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: conic-gradient(var(--green) 0 var(--score), var(--mint) var(--score) 360deg);
  color: var(--navy);
}
.score-ring span { display: block; font-size: 3.1rem; font-weight: 950; }
.score-ring small { display: block; margin-top: -20px; font-weight: 900; }

.result-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}
.wide-panel { grid-column: span 2; }

details { border-top: 1px solid var(--line); padding: 12px 0; }
summary { cursor: pointer; font-weight: 900; }
.missed-item p { margin-bottom: 8px; }
.missed-prompt,
.missed-explanation {
  display: grid;
  gap: 8px;
  overflow-wrap: break-word;
  white-space: pre-wrap;
  word-break: normal;
  line-break: strict;
}
.review-list { display: grid; gap: 10px; margin: 0; padding: 0; list-style: none; }
.review-list li { display: grid; gap: 4px; border-top: 1px solid var(--line); padding-top: 10px; }
.review-list span { color: var(--muted); }

@media (max-width: 960px) {
  .hero,
  .result-hero,
  .question-layout,
  .result-grid { grid-template-columns: 1fr; }
  .schedule-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .wide-panel { grid-column: auto; }
  .summary-card { order: -1; }
}

@media (max-width: 560px) {
  .shell { width: min(100vw - 56px, 1120px); padding: 16px 0; }
  h1 { font-size: 1.82rem; line-height: 1.12; }
  h2 { font-size: 1.08rem; line-height: 1.25; }
  .lead { font-size: 0.95rem; line-height: 1.5; }
  .summary-card, .schedule-card, .question-card, .side-panel, .panel { min-width: 0; }
  .hero { gap: 20px; }
  .hero-copy, .lead, .section-heading, .schedule-section, .schedule-grid { width: 100%; max-width: 310px; }
  .summary-card { width: 100%; max-width: 330px; }
  .schedule-card { min-height: 150px; width: 100%; max-width: 310px; }
  .schedule-card .mini-button { width: 100%; }
  .schedule-grid { grid-template-columns: 1fr; }
  .test-header { display: grid; align-items: start; }
  .choice { grid-template-columns: 38px minmax(0, 1fr); }
  .choice span { width: 34px; }
  .summary-number { font-size: 3.6rem; }
}

                               "request",
                               "prohibition"
                           ],
        "difficulty":  2,
        "review_status":  "reviewed",
        "version":  1
    }
]

};
    </script>
    <script type="module">
const QUESTION_URL = "/data/under3_n5_diagnosis_questions_v0_1_20260526.json";
const SERIES_URL = "/data/jlpt_n5_test_series_202606.json";
const MOCK1_URL = "/data/jlpt_n5_mock_1_20260612.json";
const MOCK2_URL = "/data/jlpt_n5_mock_2_20260615.json";
const MOCK3_URL = "/data/jlpt_n5_mock_3_20260619.json";
const MOCK4_URL = "/data/jlpt_n5_mock_4_20260622.json";

const TEST_QUESTION_URLS = {
  n5_warmup_preview_20260608: QUESTION_URL,
  n5_mock_test_1_20260612: MOCK1_URL,
  n5_mock_test_2_20260615: MOCK2_URL,
  n5_mock_test_3_20260619: MOCK3_URL,
  n5_mock_test_4_20260622: MOCK4_URL
};

const state = {
  series: null,
  allQuestions: [],
  activeTest: null,
  questions: [],
  index: 0,
  answers: {},
  startedAt: null,
  result: null,
  loadedQuestionSources: new Set()
};


const STATUS_UI = {
  available: { className: "available", button: "Start", disabled: false, aria: "available" },
  upcoming: { className: "upcoming", button: "Locked", disabled: true, aria: "upcoming" },
  closed: { className: "closed", button: "Closed", disabled: true, aria: "closed" },
  pending_content: { className: "pending-content", button: "Preparing", disabled: true, aria: "content preparing" }
};

function statusMeta(status) {
  return STATUS_UI[status] || { className: "unknown", button: "Unavailable", disabled: true, aria: "unavailable" };
}

const app = document.querySelector("#app");

async function loadJson(url) {
  if (window.__N5_INLINE_DATA__ && window.__N5_INLINE_DATA__[url]) {
    return window.__N5_INLINE_DATA__[url];
  }
  const response = await fetch(url, { cache: "no-store" });
  if (!response.ok) throw new Error(`${url} load failed: ${response.status}`);
  const text = await response.text();
  return JSON.parse(text.replace(/^\uFEFF/, ""));
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDate(value) {
  const date = new Date(`${value}T00:00:00`);
  return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function currentDateString() {
  const override = new URLSearchParams(location.search).get("today");
  if (override && /^\d{4}-\d{2}-\d{2}$/.test(override)) return override;
  return new Date().toISOString().slice(0, 10);
}

function effectiveTestStatus(test, today = currentDateString()) {
  if (test.status === "closed" || test.status === "pending_content") return test.status;
  if (test.status === "available") {
    if (test.open_date > today) return "upcoming";
    return test.question_ids.length ? "available" : "pending_content";
  }
  if (test.status === "upcoming" && test.open_date <= today) {
    return test.question_ids.length ? "available" : "pending_content";
  }
  return test.status;
}

function availableTests() {
  return state.series.tests.filter((test) => effectiveTestStatus(test) === "available" && test.question_ids.length > 0);
}

function getQuestionById(questionId) {
  return state.allQuestions.find((question) => question.question_id === questionId);
}

async function loadQuestionSourceForTest(test) {
  const url = TEST_QUESTION_URLS[test?.test_id];
  if (!url || state.loadedQuestionSources.has(url)) return;
  const loadedQuestions = await loadJson(url);
  state.allQuestions = [...state.allQuestions, ...loadedQuestions];
  state.loadedQuestionSources.add(url);
}

async function chooseTest(testId) {
  const test = state.series.tests.find((item) => item.test_id === testId) || availableTests()[0];
  if (!test || effectiveTestStatus(test) !== "available") return false;
  await loadQuestionSourceForTest(test);
  const questions = test.question_ids.map(getQuestionById).filter(Boolean);
  if (!questions.length) return false;
  state.activeTest = test;
  state.questions = questions;
  return true;
}

function progressLabel() {
  return `${Object.keys(state.answers).length}/${state.questions.length}`;
}

function renderStart() {
  const firstAvailable = availableTests()[0];
  const warmupCount = firstAvailable?.question_ids.length || 0;
  app.innerHTML = `
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">JLPT N5 Practice</p>
          <h1>${escapeHtml(state.series.title)}</h1>
          <p class="lead">${escapeHtml(state.series.subtitle)} Start with the warm-up test, then continue as each scheduled mock test opens.</p>
          <div class="actions">
            <button class="primary" data-action="start" data-test-id="${escapeHtml(firstAvailable?.test_id || "")}" ${firstAvailable ? "" : "disabled"}>Start Warm-up</button>
          </div>
        </div>
        <aside class="summary-card" aria-label="Series summary">
          <span class="summary-number">${warmupCount}</span>
          <strong>Warm-up questions</strong>
          <p>No login, no account, no public ranking. Your answers stay in this browser.</p>
        </aside>
      </section>

      <section class="schedule-section" aria-label="Test schedule">
        <div class="section-heading">
          <p class="eyebrow">Schedule</p>
          <h2>New tests open on the current launch schedule</h2>
        </div>
        <div class="schedule-grid">
          ${state.series.tests.map(renderScheduleCard).join("")}
        </div>
      </section>

      <section class="disclaimer-band">
        <strong>Independent practice site</strong>
        <p>${escapeHtml(state.series.disclaimer)}</p>
      </section>
    </main>
  `;
}

function renderScheduleCard(test) {
  const effectiveStatus = effectiveTestStatus(test);
  const meta = statusMeta(effectiveStatus);
  const canStart = effectiveStatus === "available" && test.question_ids.length > 0;
  const disabled = !canStart || meta.disabled;
  return `
    <article class="schedule-card ${meta.className}" aria-label="${escapeHtml(`${test.label}, ${meta.aria}`)}">
      <div>
        <div class="card-meta"><span class="date-pill">${escapeHtml(formatDate(test.open_date))}</span>${canStart ? `<span class="state-pill">Open now</span>` : ""}</div>
        <h3>${escapeHtml(test.label)}</h3>
        <p>${escapeHtml(test.status_copy)}</p>
      </div>
      <button class="mini-button" data-action="start" data-test-id="${escapeHtml(test.test_id)}" aria-disabled="${disabled ? "true" : "false"}" ${disabled ? "disabled" : ""}>
        ${escapeHtml(canStart ? meta.button : meta.button)}
      </button>
    </article>
  `;
}

async function startAttempt(testId) {
  if (!(await chooseTest(testId))) return;
  state.index = 0;
  state.answers = {};
  state.startedAt = new Date();
  state.result = null;
  renderQuestion();
}

function renderQuestion() {
  const question = state.questions[state.index];
  const supportCopy = activeTestSupportCopy();
  const selected = state.answers[question.question_id];
  const canGoBack = state.index > 0;
  const canGoNext = state.index < state.questions.length - 1;
  const allAnswered = Object.keys(state.answers).length === state.questions.length;
  const progress = Math.round(((state.index + 1) / state.questions.length) * 100);

  app.innerHTML = `
    <main class="shell test-shell">
      <header class="test-header">
        <div>
          <p class="eyebrow">${escapeHtml(state.activeTest.label)} / ${escapeHtml(sectionLabel(question.section))}</p>
          <h1>Question ${state.index + 1}</h1>
        </div>
        <div class="counter">${progressLabel()}</div>
      </header>
      <div class="progress-track"><span style="width:${progress}%"></span></div>

      <section class="question-layout">
        <article class="question-card">
          <p class="question-id">${escapeHtml(question.primary_tag.replaceAll("_", " "))}</p>
          <h2 lang="ja">${escapeHtml(question.prompt)}</h2>
          <div class="choices">
            ${question.choices.map((choice) => `
              <button class="choice ${selected === choice.id ? "selected" : ""}" data-choice="${escapeHtml(choice.id)}">
                <span>${escapeHtml(choice.id)}</span>
                <strong lang="ja">${escapeHtml(choice.text)}</strong>
              </button>
            `).join("")}
          </div>
        </article>

        <aside class="side-panel">
          <h2>${escapeHtml(supportCopy.heading)}</h2>
          <p>${escapeHtml(supportCopy.body)}</p>
          <div class="skill-card">
            <span>Current area</span>
            <strong>${escapeHtml(sectionLabel(question.section))}</strong>
            <p>${escapeHtml(supportCopy.review)}</p>
          </div>
          <p class="small-note">${escapeHtml(state.series.disclaimer)}</p>
        </aside>
      </section>

      <footer class="nav-row">
        <button class="secondary" data-action="prev" ${canGoBack ? "" : "disabled"}>Previous</button>
        <button class="secondary" data-action="next" ${canGoNext ? "" : "disabled"}>Next</button>
        <button class="primary" data-action="submit" ${allAnswered ? "" : "disabled"}>Show Score</button>
      </footer>
    </main>
  `;
}

function sectionLabel(section) {
  const labels = {
    vocabulary: "Vocabulary",
    grammar: "Grammar",
    reading: "Reading",
    kanji: "Kanji",
    expression: "Expression"
  };
  return labels[section] || section;
}

function activeTestSupportCopy() {
  if (state.activeTest?.kind === "warmup") {
    return {
      heading: "Warm-up focus",
      body: "This preview checks a small set of N5 vocabulary and grammar points before the full series opens.",
      review: "Answer first. Review appears after you finish the warm-up."
    };
  }
  return {
    heading: "Mock test focus",
    body: "Work through the full N5-style set, then use the result screen to review missed areas.",
    review: "Answer first. Review appears after you finish this mock test."
  };
}

function perfectScoreCopy() {
  return state.activeTest?.kind === "warmup"
    ? "No mistakes in this warm-up. Keep going with the next test when it opens."
    : "No mistakes in this mock test. Keep the same pace and return for the next scheduled test.";
}

function selectAnswer(choiceId) {
  const question = state.questions[state.index];
  state.answers[question.question_id] = choiceId;
  renderQuestion();
}

function scoreAttempt() {
  const questionResults = state.questions.map((question) => {
    const selectedChoiceId = state.answers[question.question_id] || null;
    return {
      question,
      selectedChoiceId,
      selectedChoiceText: question.choices.find((choice) => choice.id === selectedChoiceId)?.text || "",
      correctChoiceId: question.correct_choice_id,
      correctChoiceText: question.choices.find((choice) => choice.id === question.correct_choice_id)?.text || "",
      isCorrect: selectedChoiceId === question.correct_choice_id
    };
  });
  const correctCount = questionResults.filter((item) => item.isCorrect).length;
  const scorePercent = Math.round((correctCount / questionResults.length) * 100);
  return {
    correctCount,
    scorePercent,
    questionResults,
    durationSec: Math.max(1, Math.round((Date.now() - state.startedAt.getTime()) / 1000))
  };
}

function submitAttempt() {
  state.result = scoreAttempt();
  renderResult();
}

function renderResult() {
  const result = state.result;
  const missed = result.questionResults.filter((item) => !item.isCorrect);
  const nextTest = state.series.tests.find((test) => test.open_date > currentDateString() && test.status !== "closed");
  const nextStepCopy = nextTest
    ? `${nextTest.label} opens ${formatDate(nextTest.open_date)}. Review your warm-up mistakes now, then come back for the first full mock test.`
    : "Review your mistakes now, then return when the next scheduled practice opens.";
  app.innerHTML = `
    <main class="shell result-shell">
      <section class="result-hero">
        <div>
          <p class="eyebrow">${escapeHtml(state.activeTest.label)}</p>
          <h1>Score</h1>
          <p class="lead">You answered ${result.correctCount} of ${state.questions.length} questions correctly. This is practice feedback only.</p>
        </div>
        <div class="score-ring" style="--score:${result.scorePercent * 3.6}deg">
          <span>${result.scorePercent}%</span>
          <small>${result.correctCount}/${state.questions.length}</small>
        </div>
      </section>

      <section class="result-grid">
        <article class="panel wide-panel">
          <h2>Mistake Review</h2>
          ${missed.length ? missed.map(renderMissedItem).join("") : `<p>${escapeHtml(perfectScoreCopy())}</p>`}
        </article>
        <article class="panel">
          <h2>Final Review Points</h2>
          ${renderReviewPoints(missed)}
        </article>
        <article class="panel">
          <h2>Next Step</h2>
          <p>${escapeHtml(nextStepCopy)}</p>
          <p class="small-note">No account needed. Use this warm-up result as your first review map.</p>
        </article>
        <article class="panel">
          <h2>Report an issue</h2>
          <p>If a question looks unclear, save a short note locally and review it before the next release.</p>
          <p class="small-note">No account, no database, no public ranking in this version.</p>
        </article>
      </section>

      <section class="disclaimer-band">
        <strong>Independent practice site</strong>
        <p>${escapeHtml(state.series.disclaimer)}</p>
      </section>

      <footer class="nav-row">
        <button class="secondary" data-action="restart">Back to Schedule</button>
      </footer>
    </main>
  `;
}

function renderMissedItem(item) {
  return `
    <details class="missed-item" open>
      <summary>${escapeHtml(sectionLabel(item.question.section))} / ${escapeHtml(item.question.primary_tag.replaceAll("_", " "))}</summary>
      <p class="missed-prompt"><strong>Question:</strong> <span lang="ja">${escapeHtml(item.question.prompt)}</span></p>
      <p><strong>Your answer:</strong> ${escapeHtml(item.selectedChoiceId || "-")} <span lang="ja">${escapeHtml(item.selectedChoiceText)}</span></p>
      <p><strong>Correct answer:</strong> ${escapeHtml(item.correctChoiceId)} <span lang="ja">${escapeHtml(item.correctChoiceText)}</span></p>
      <p class="missed-explanation"><strong>Explanation:</strong> ${escapeHtml(item.question.explanation)}</p>
    </details>
  `;
}

function renderReviewPoints(missed) {
  if (!missed.length) return "<p>No urgent review points from this attempt.</p>";
  const counts = missed.reduce((map, item) => {
    const key = sectionLabel(item.question.section);
    map.set(key, (map.get(key) || 0) + 1);
    return map;
  }, new Map());
  return `
    <ul class="review-list">
      ${[...counts.entries()].map(([label, count]) => `<li><strong>${escapeHtml(label)}</strong><span>${count} item(s) to review</span></li>`).join("")}
    </ul>
  `;
}

app.addEventListener("click", async (event) => {
  const choice = event.target.closest("[data-choice]");
  if (choice) {
    selectAnswer(choice.dataset.choice);
    return;
  }
  const actionTarget = event.target.closest("[data-action]");
  if (!actionTarget) return;
  const action = actionTarget.dataset.action;
  if (action === "start") startAttempt(actionTarget.dataset.testId);
  if (action === "prev" && state.index > 0) {
    state.index -= 1;
    renderQuestion();
  }
  if (action === "next" && state.index < state.questions.length - 1) {
    state.index += 1;
    renderQuestion();
  }
  if (action === "submit") submitAttempt();
  if (action === "restart") renderStart();
});

async function init() {
  try {
    state.series = await loadJson(SERIES_URL);
    const firstAvailable = availableTests()[0];
    if (firstAvailable) await chooseTest(firstAvailable.test_id);
    renderStart();
  } catch (error) {
    app.innerHTML = `
      <main class="shell">
        <section class="loading-panel">
          <p class="eyebrow">Load Error</p>
          <h1>Could not load local data.</h1>
          <p>${escapeHtml(error.message)}</p>
        </section>
      </main>
    `;
  }
}

init();











    </script>
    <script>
      (function () {
        const formName = "n5-visit-log";
        const siteVersion = "warmup-v2-visit-log-20260614";
        const sessionFlag = "n5VisitLogged:" + siteVersion;

        function getOrCreateStoredId(key) {
          try {
            const existing = localStorage.getItem(key);
            if (existing) return existing;
            const fresh = (crypto && crypto.randomUUID)
              ? crypto.randomUUID()
              : String(Date.now()) + "-" + Math.random().toString(16).slice(2);
            localStorage.setItem(key, fresh);
            return fresh;
          } catch (error) {
            return "storage-unavailable";
          }
        }

        function getReferrerHost() {
          try {
            if (!document.referrer) return "direct";
            return new URL(document.referrer).hostname || "unknown";
          } catch (error) {
            return "unknown";
          }
        }

        function getScreenBucket() {
          const width = window.innerWidth || 0;
          if (width < 480) return "mobile-small";
          if (width < 768) return "mobile";
          if (width < 1024) return "tablet";
          return "desktop";
        }

        try {
          if (sessionStorage.getItem(sessionFlag)) return;
          sessionStorage.setItem(sessionFlag, "1");

          const payload = {
            "form-name": formName,
            event_type: "page_view",
            site_version: siteVersion,
            landing_path: window.location.pathname || "/",
            referrer_host: getReferrerHost(),
            visitor_key: getOrCreateStoredId("n5VisitorKey"),
            session_key: (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()),
            language: navigator.language || "unknown",
            timezone_offset: String(new Date().getTimezoneOffset()),
            screen_bucket: getScreenBucket(),
            created_at_client: new Date().toISOString()
          };

          fetch("/", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(payload).toString(),
            keepalive: true
          }).catch(function () {});
        } catch (error) {}
      })();
    </script>
  </body>
</html>
